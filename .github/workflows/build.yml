name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for required files
      run: |
        test -f project.godot || { echo "Missing project.godot"; exit 1; }
        test -f scenes/main.tscn || { echo "Missing main scene"; exit 1; }
        
    - name: Validate GDScript syntax
      run: |
        # 检查所有 .gd 文件语法（使用 godot 的 --check-only 模式）
        # 注意：需要先安装 Godot，这里仅做文件存在性检查
        echo "Checking GDScript files exist..."
        for f in $(find . -name "*.gd"); do
          echo "  Found: $f"
          # 可以添加实际的语法检查（需要 Godot 安装）
        done
        
    - name: Lint with gdscript-lint (if available)
      continue-on-error: true
      run: |
        # 可选：安装 gdscript-lint 进行更严格的检查
        npm install -g gdscript-lint || echo "gdscript-lint not available"
        
    - name: Print project structure
      run: |
        echo "Project root:"
        ls -la
        echo -e "\nScripts:"
        find scripts -type f -name "*.gd" | head -20

  export-web:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Godot
      run: |
        GODOT_VERSION=4.3.0
        wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
        unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
        chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64/Godot
        echo "$(pwd)/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> $GITHUB_PATH
        
    - name: Export HTML5 build
      run: |
        # 尝试导出 Web 版本（需要启用 HTML5 导出模板）
        # godot --headless --export-release "HTML5" build/web/index.html || echo "HTML5 export not configured"
        echo "Web export skipped (template not installed)"
        
    - name: List exports
      run: |
        ls -la build/ 2>/dev/null || echo "No builds yet"
        
  notify:
    needs: [validate, export-web]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Build status
      run: |
        echo "✅ Validate passed"
        echo "📦 Export completed (if configured)"
        echo "🚀 Ready to deploy!"
